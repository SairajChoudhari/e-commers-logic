<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Cart</title>
    <style>
        body{
            font-family: Arial;
            margin: 40px;
        }
        .product{
            border: 1px solid #000;
            padding: 15px;
            width: 220px;
            margin-bottom: 15px;
        }
        button{
            padding: 8px 12px;
        }
        #cart{
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>E-Commerce Cart</h1>

<div class="product">
    <h3>Laptop</h3>
    <p>Price: ₹50000</p>
    <button onclick="addToCart('Laptop',50000)">Add to Cart</button>
</div>

<div class="product">
    <h3>Headphones</h3>
    <p>Price: ₹2000</p>
    <button onclick="addToCart('Headphones',2000)">Add to Cart</button>
</div>

<div class="product">
    <h3>Mouse</h3>
    <p>Price: ₹800</p>
    <button onclick="addToCart('Mouse',800)">Add to Cart</button>
</div>

<h2>Shopping Cart</h2>
<ul id="cartItems"></ul>
<h3>Total: ₹<span id="total">0</span></h3>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    let list = document.getElementById("cartItems");
    list.innerHTML = "";

    for (let item of cart) {
        let li = document.createElement("li");
        li.textContent = item.name + " - ₹" + item.price;
        list.appendChild(li);
    }

    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
